name: TNE comprehensive AI training and evaluation

on:
  push:
    branches:
      - codex/tne-authoritative-source-recertification
    paths:
      - "the_nothingness_effect/artificial_intelligence/**"
      - "tools/run_comprehensive_ai_evaluation.py"
      - "tests/numerical/test_comprehensive_ai_evaluation.py"
      - ".github/workflows/ai-comprehensive-evaluation.yml"
  pull_request:
    paths:
      - "the_nothingness_effect/artificial_intelligence/**"
      - "tools/run_comprehensive_ai_evaluation.py"
      - "tests/numerical/test_comprehensive_ai_evaluation.py"
      - ".github/workflows/ai-comprehensive-evaluation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  comprehensive-ai-cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt -r requirements-ai.txt
      - run: python -m pip install -e .
      - name: Verify extended dataset and no-local-RBM geometric contracts
        run: >-
          python -m pytest -q
          tests/numerical/test_comprehensive_ai_evaluation.py
      - name: Train, validate and evaluate QENN, PGQENN and SOInets
        run: >-
          python tools/run_comprehensive_ai_evaluation.py
          --output reports/artificial_intelligence_comprehensive
          --seeds 0 1 2
          --epochs 60
          --samples-per-class 24
      - name: Package complete AI evidence
        run: >-
          python -m zipfile -c
          reports/artificial_intelligence_comprehensive.zip
          reports/artificial_intelligence_comprehensive
      - name: Upload complete AI data, metrics, checkpoints and visuals
        uses: actions/upload-artifact@v4
        with:
          name: tne-artificial-intelligence-comprehensive
          path: |
            reports/artificial_intelligence_comprehensive
            reports/artificial_intelligence_comprehensive.zip
          if-no-files-found: error
