name: TNE real CIFAR training and evaluation

on:
  push:
    branches:
      - codex/tne-authoritative-source-recertification
    paths:
      - "the_nothingness_effect/artificial_intelligence/multimodal/real_data.py"
      - "tools/download_verified_cifar_archives.py"
      - "tools/run_comprehensive_ai_evaluation.py"
      - "tools/run_real_data_ai_evaluation.py"
      - "tests/numerical/test_comprehensive_ai_evaluation.py"
      - "tests/numerical/test_real_multimodal_data.py"
      - ".github/workflows/ai-real-dataset-evaluation.yml"
  pull_request:
    paths:
      - "the_nothingness_effect/artificial_intelligence/multimodal/real_data.py"
      - "tools/download_verified_cifar_archives.py"
      - "tools/run_comprehensive_ai_evaluation.py"
      - "tools/run_real_data_ai_evaluation.py"
      - "tests/numerical/test_comprehensive_ai_evaluation.py"
      - "tests/numerical/test_real_multimodal_data.py"
      - ".github/workflows/ai-real-dataset-evaluation.yml"
  workflow_dispatch:
    inputs:
      epochs:
        description: Bounded training epochs
        required: false
        default: "8"
      samples_per_class:
        description: Total selected observations per class
        required: false
        default: "12"
      max_classes:
        description: Bounded classes per CIFAR archive
        required: false
        default: "4"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  real-cifar-cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      EPOCHS: ${{ inputs.epochs || '8' }}
      SAMPLES_PER_CLASS: ${{ inputs.samples_per_class || '12' }}
      MAX_CLASSES: ${{ inputs.max_classes || '4' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: >-
          python -m pip install
          -r requirements-dev.txt
          -r requirements-ai.txt
          "huggingface_hub>=0.30,<2"
      - run: python -m pip install -e .
      - name: Verify shared readout, CIFAR loader, deduplication and audio boundaries
        run: >-
          python -m pytest -q
          tests/numerical/test_comprehensive_ai_evaluation.py
          tests/numerical/test_real_multimodal_data.py
      - name: Download byte-identical CIFAR Python archives
        run: >-
          python tools/download_verified_cifar_archives.py
          --output .ci-data
      - name: Train, validate and evaluate CIFAR-10
        run: >-
          python tools/run_real_data_ai_evaluation.py
          --archive .ci-data/cifar-10-python.tar.gz
          --variant cifar-10
          --output reports/artificial_intelligence_real/cifar-10
          --seeds 0 1
          --epochs "$EPOCHS"
          --samples-per-class "$SAMPLES_PER_CLASS"
          --max-classes "$MAX_CLASSES"
      - name: Train, validate and evaluate CIFAR-100
        run: >-
          python tools/run_real_data_ai_evaluation.py
          --archive .ci-data/cifar-100-python.tar.gz
          --variant cifar-100
          --output reports/artificial_intelligence_real/cifar-100
          --seeds 0 1
          --epochs "$EPOCHS"
          --samples-per-class "$SAMPLES_PER_CLASS"
          --max-classes "$MAX_CLASSES"
      - name: Package bounded real-data evidence
        run: |
          cp .ci-data/cifar_source_manifest.json reports/artificial_intelligence_real/
          python -m zipfile -c \
            reports/artificial_intelligence_real.zip \
            reports/artificial_intelligence_real
      - name: Upload real CIFAR metrics, checkpoints and provenance
        uses: actions/upload-artifact@v4
        with:
          name: tne-artificial-intelligence-real-cifar
          path: |
            reports/artificial_intelligence_real
            reports/artificial_intelligence_real.zip
          if-no-files-found: error
