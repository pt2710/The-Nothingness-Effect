name: apply-authoritative-alignment-phase1

on:
  push:
    branches:
      - codex/tne-authoritative-appendix-alignment-fixes
    paths:
      - tools/apply_authoritative_alignment_phase1.py
      - tools/.alignment_payload/**
      - .github/workflows/apply-authoritative-alignment-phase1.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/tne-authoritative-appendix-alignment-fixes
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply authoritative appendix alignment phase one
        run: python tools/apply_authoritative_alignment_phase1.py
      - name: Commit alignment changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Recertify authoritative appendix bindings and completeness contracts"
          git push origin HEAD:codex/tne-authoritative-appendix-alignment-fixes
