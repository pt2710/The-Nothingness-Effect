name: authoritative-appendix-alignment-export

on:
  push:
    branches:
      - codex/tne-authoritative-appendix-alignment-audit
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: authoritative-appendix-alignment-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt -r requirements-ai.txt
      - run: python -m pip install -e .
      - name: Build alignment export
        run: |
          python - <<'PY'
          from __future__ import annotations

          import csv
          import json
          from collections import Counter, defaultdict
          from pathlib import Path

          from the_nothingness_effect._runtime.theorem_complex_runtime.catalog import (
              dependency_downgrades,
              release_statuses,
          )

          root = Path.cwd()
          matrix_path = root / "docs/data/theorem_complex_implementation_matrix.csv"
          with matrix_path.open(newline="", encoding="utf-8-sig") as handle:
              rows = list(csv.DictReader(handle))

          effective = release_statuses(matrix_path)
          downgraded = dependency_downgrades(matrix_path)
          downgrade_by_id = {str(item["complex_id"]): item for item in downgraded}

          def exists(value: str) -> bool:
              return bool(value) and (root / value).exists()

          exported_rows = []
          for row in rows:
              identifier = row["complex_id"]
              exported_rows.append(
                  {
                      "complex_id": identifier,
                      "source_complex_id": row["source_complex_id"],
                      "appendix_file": row["appendix_file"],
                      "appendix_source_sha256": row["appendix_source_sha256"],
                      "part": row["part"],
                      "level": row["level"],
                      "complex_title": row["complex_title"],
                      "first_label": row["first_label"],
                      "equation_labels": [
                          value for value in row["equation_labels"].split(";") if value
                      ],
                      "module": row["module"],
                      "baseline_status": row["baseline_status"],
                      "requested_status": row["implementation_status"],
                      "effective_status": effective[identifier],
                      "implementation_path": row["implementation_path"],
                      "implementation_path_exists": exists(row["implementation_path"]),
                      "test_path": row["test_path"],
                      "test_path_exists": exists(row["test_path"]),
                      "simulation_path": row["simulation_path"],
                      "simulation_path_exists": exists(row["simulation_path"]),
                      "visualization_path": row["visualization_path"],
                      "visualization_path_exists": exists(row["visualization_path"]),
                      "artifact_status": row["artifact_status"],
                      "appendix_label_verification": row["appendix_label_verification"],
                      "decision_note": row["decision_note"],
                      "source_complex_ids": [
                          value for value in row["source_complex_ids"].split(";") if value
                      ],
                      "dependency_status": row["dependency_status"],
                      "status_reason": row["status_reason"],
                      "carrier_violation": row["carrier_violation"],
                      "dependency_downgrade": downgrade_by_id.get(identifier),
                  }
              )

          def counts(field: str, selected=None):
              source = exported_rows if selected is None else selected
              return dict(sorted(Counter(str(row[field]) for row in source).items()))

          by_appendix = defaultdict(list)
          by_module = defaultdict(list)
          for row in exported_rows:
              by_appendix[row["appendix_file"]].append(row)
              by_module[row["module"]].append(row)

          committed_final_qa = root / "reports/final_qa_manifest.json"
          committed_qa = (
              json.loads(committed_final_qa.read_text(encoding="utf-8"))
              if committed_final_qa.exists()
              else None
          )

          missing_paths = {
              key: [row["complex_id"] for row in exported_rows if not row[key]]
              for key in (
                  "implementation_path_exists",
                  "test_path_exists",
                  "simulation_path_exists",
                  "visualization_path_exists",
              )
          }

          payload = {
              "schema_version": "1.0",
              "repository_head": "${{ github.sha }}",
              "matrix_sha": "525111359b53f03c8eb6f2dcec8b74066c4cde89",
              "total_rows": len(exported_rows),
              "requested_status_counts": counts("requested_status"),
              "effective_status_counts": counts("effective_status"),
              "level_counts": counts("level"),
              "dependency_downgrade_count": len(downgraded),
              "dependency_downgrades": list(downgraded),
              "proxy_or_downgraded_ids": [
                  row["complex_id"]
                  for row in exported_rows
                  if row["effective_status"] != "implemented"
              ],
              "requested_proxy_ids": [
                  row["complex_id"]
                  for row in exported_rows
                  if row["requested_status"] != "implemented"
              ],
              "missing_paths": missing_paths,
              "appendix_summary": {
                  appendix: {
                      "source_sha256": sorted(
                          {row["appendix_source_sha256"] for row in group}
                      ),
                      "total": len(group),
                      "levels": dict(sorted(Counter(row["level"] for row in group).items())),
                      "requested": dict(
                          sorted(Counter(row["requested_status"] for row in group).items())
                      ),
                      "effective": dict(
                          sorted(Counter(row["effective_status"] for row in group).items())
                      ),
                      "proxy_ids": [
                          row["complex_id"]
                          for row in group
                          if row["effective_status"] != "implemented"
                      ],
                  }
                  for appendix, group in sorted(by_appendix.items())
              },
              "module_summary": {
                  module: {
                      "total": len(group),
                      "levels": dict(sorted(Counter(row["level"] for row in group).items())),
                      "requested": dict(
                          sorted(Counter(row["requested_status"] for row in group).items())
                      ),
                      "effective": dict(
                          sorted(Counter(row["effective_status"] for row in group).items())
                      ),
                      "proxy_ids": [
                          row["complex_id"]
                          for row in group
                          if row["effective_status"] != "implemented"
                      ],
                  }
                  for module, group in sorted(by_module.items())
              },
              "committed_final_qa_manifest": committed_qa,
              "rows": exported_rows,
          }

          output = root / "alignment-export"
          output.mkdir(exist_ok=True)
          (output / "authoritative_appendix_alignment_export.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8"
          )
          (output / "theorem_complex_implementation_matrix.csv").write_bytes(
              matrix_path.read_bytes()
          )
          print(
              "alignment_export=complete "
              f"rows={len(exported_rows)} "
              f"requested={payload['requested_status_counts']} "
              f"effective={payload['effective_status_counts']} "
              f"downgrades={len(downgraded)}"
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: authoritative-appendix-alignment-export
          path: alignment-export
          if-no-files-found: error
          retention-days: 30
