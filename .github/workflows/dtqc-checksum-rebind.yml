name: DTQC checksum rebind

on:
  pull_request:
    paths:
      - .github/workflows/dtqc-checksum-rebind.yml

permissions:
  contents: write

jobs:
  rebind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt -r requirements-ai.txt
      - name: Rebind checksum manifest to tracked DTQC bytes
        shell: bash
        run: |
          python - <<'PYCODE'
          import hashlib
          import json
          from pathlib import Path

          root = Path("the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts/legacy_faithful")
          expected = {
              "dtqc_legacy_summary.png",
              "dtqc_legacy_quasicrystal_contour.png",
              "dtqc_legacy_diffraction_fft.png",
              "dtqc_legacy_dfi_surface.png",
              "dtqc_legacy_elastic_pi_surface.png",
              "dtqc_legacy_wavelet_ridges.png",
              "dtqc_legacy_flowpoint_flicker.gif",
              "dtqc_legacy_5d_scatter.gif",
              "dtqc_legacy_elastic_pi_sphere.gif",
              "dtqc_legacy_elastic_pi_half_sphere.gif",
              "dtqc_legacy_metrics.csv",
              "dtqc_legacy_state.npz",
              "dtqc_legacy_source_removal.csv",
              "dtqc_legacy_checksums.json",
              "dtqc_legacy_metadata.json",
          }
          actual = {path.name for path in root.iterdir() if path.is_file()}
          if actual != expected:
              raise SystemExit(f"inventory mismatch: missing={sorted(expected-actual)} extra={sorted(actual-expected)}")
          files = {
              name: hashlib.sha256((root / name).read_bytes()).hexdigest()
              for name in sorted(expected - {"dtqc_legacy_checksums.json"})
          }
          payload = {"algorithm": "sha256", "files": files, "schema_version": "1.0"}
          (root / "dtqc_legacy_checksums.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(payload, indent=2, sort_keys=True))
          PYCODE
      - name: Validate runtime and tracked artifact bytes
        run: >-
          python -m pytest -q
          tests/numerical/test_dtqc_legacy_faithful_runtime.py
          tests/artifacts/test_dtqc_legacy_faithful_artifacts.py
      - name: Commit checksum rebind if required
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts/legacy_faithful/dtqc_legacy_checksums.json
          if git diff --cached --quiet; then
            echo "Checksum manifest already matches tracked bytes"
            exit 0
          fi
          git commit -m "Rebind DTQC checksums to tracked artifact bytes"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
