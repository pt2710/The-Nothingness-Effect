name: DTQC checksum rebind

on:
  pull_request:
    paths:
      - .github/workflows/dtqc-checksum-rebind.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt -r requirements-ai.txt
      - name: Regenerate complete tracked DTQC artifact inventory
        run: >-
          python -m
          the_nothingness_effect.gravitational_cosmological_and_quantum_dynamics_architecture.discrete_time_quasicrystals_in_the_flowpoint.simulation.run_legacy_faithful_suite
          --output
          the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts/legacy_faithful
          --seed 0
          --grid-size 72
      - name: Validate runtime and tracked artifact bytes
        run: >-
          python -m pytest -q
          tests/numerical/test_dtqc_legacy_faithful_runtime.py
          tests/artifacts/test_dtqc_legacy_faithful_artifacts.py
      - name: Commit regenerated artifact inventory if required
        shell: bash
        run: |
          artifact_dir="the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts/legacy_faithful"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$artifact_dir"
          if git diff --cached --quiet; then
            echo "Tracked DTQC artifact inventory already matches the deterministic generator"
            exit 0
          fi
          git commit -m "Regenerate tracked DTQC legacy-faithful artifacts"
          git push origin "HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}"
