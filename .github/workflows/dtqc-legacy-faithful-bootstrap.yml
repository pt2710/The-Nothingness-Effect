name: DTQC legacy-faithful bootstrap

on:
  push:
    branches:
      - codex/tne-authoritative-source-recertification
    paths:
      - .github/workflows/dtqc-legacy-faithful-bootstrap.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install numpy scipy matplotlib imageio pillow pytest
      - name: Materialize reviewed DTQC source patch
        shell: bash
        run: |
          python - <<'PYCODE'
          import base64
          import hashlib
          import io
          from pathlib import Path
          import tarfile

          payload = ""
          archive = base64.b64decode(payload, validate=True)
          expected = "e8184ada35ef890ade7bcdfd010d2b37360d5988eeccb97bf0372b8872f0ef89"
          actual = hashlib.sha256(archive).hexdigest()
          if actual != expected:
              raise SystemExit(f"payload checksum mismatch: {actual} != {expected}")
          with tarfile.open(fileobj=io.BytesIO(archive), mode="r:gz") as bundle:
              members = bundle.getmembers()
              for member in members:
                  path = Path(member.name)
                  if path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"unsafe archive member: {member.name}")
              bundle.extractall(".")
          PYCODE
      - name: Validate DTQC runtime and artifacts
        run: |
          python -m compileall -q the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint tests/numerical/test_dtqc_legacy_faithful_runtime.py tests/artifacts/test_dtqc_legacy_faithful_artifacts.py
          python -m pytest -q tests/numerical/test_dtqc_legacy_faithful_runtime.py tests/artifacts/test_dtqc_legacy_faithful_artifacts.py
          python -m the_nothingness_effect.gravitational_cosmological_and_quantum_dynamics_architecture.discrete_time_quasicrystals_in_the_flowpoint.simulation.run_legacy_faithful_suite --output the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts/legacy_faithful --seed 0 --grid-size 72
          python -m pytest -q tests/artifacts/test_dtqc_legacy_faithful_artifacts.py
      - name: Commit verified DTQC implementation and fresh artifacts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/legacy_faithful_runtime.py the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/run_legacy_faithful_suite.py the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/run_contract_suite.py the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts/legacy_faithful tests/numerical/test_dtqc_legacy_faithful_runtime.py tests/artifacts/test_dtqc_legacy_faithful_artifacts.py
          if git diff --cached --quiet; then
            echo "No DTQC changes to commit"
            exit 0
          fi
          git commit -m "Add legacy-faithful DTQC visualization runtime"
          git push origin "HEAD:${{ github.ref_name }}"
