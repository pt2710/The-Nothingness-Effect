name: DTQC full source-faithful artifact validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  runtime-and-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt -r requirements-ai.txt
      - name: Validate DTQC source-faithful runtime
        run: >-
          python -m pytest -q
          tests/numerical/test_dtqc_legacy_faithful_runtime.py
          tests/artifacts/test_dtqc_legacy_faithful_artifacts.py
      - name: Regenerate the complete DTQC artifact tree
        run: >-
          python -m
          the_nothingness_effect.gravitational_cosmological_and_quantum_dynamics_architecture.discrete_time_quasicrystals_in_the_flowpoint.simulation.run_contract_suite
          --output "${{ runner.temp }}/dtqc-artifacts"
          --seed 1
          --grid-size 240
          --time-steps 48
          --point-count 8000
          --sphere-resolution 64
      - name: Upload regenerated DTQC tree
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dtqc-full-artifacts-${{ github.sha }}
          path: ${{ runner.temp }}/dtqc-artifacts
          if-no-files-found: error
          compression-level: 9
          retention-days: 14
      - name: Build DTQC inventory evidence
        if: always()
        env:
          GENERATED_DTQC: ${{ runner.temp }}/dtqc-artifacts
          TRACKED_DTQC: the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts
          EVIDENCE_DIR: ${{ runner.temp }}/dtqc-inventory-evidence
        run: |
          mkdir -p "$EVIDENCE_DIR"
          find "$GENERATED_DTQC" -maxdepth 2 -type f -printf '%P\n' | sort > "$EVIDENCE_DIR/generated-files.txt"
          find "$TRACKED_DTQC" -maxdepth 2 -type f -printf '%P\n' | sort > "$EVIDENCE_DIR/tracked-files.txt"
          (cd "$GENERATED_DTQC" && find . -maxdepth 2 -type f -print0 | sort -z | xargs -0 sha256sum) > "$EVIDENCE_DIR/generated-sha256.txt"
          (cd "$TRACKED_DTQC" && find . -maxdepth 2 -type f -print0 | sort -z | xargs -0 sha256sum) > "$EVIDENCE_DIR/tracked-sha256.txt"
          diff -u "$EVIDENCE_DIR/generated-files.txt" "$EVIDENCE_DIR/tracked-files.txt" > "$EVIDENCE_DIR/inventory.diff" || true
          diff -u "$EVIDENCE_DIR/generated-sha256.txt" "$EVIDENCE_DIR/tracked-sha256.txt" > "$EVIDENCE_DIR/checksums.diff" || true
      - name: Upload DTQC inventory evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dtqc-inventory-evidence-${{ github.sha }}
          path: ${{ runner.temp }}/dtqc-inventory-evidence
          if-no-files-found: error
          retention-days: 14
      - name: Verify tracked root, subfolder, metadata, and exact bytes
        env:
          GENERATED_DTQC: ${{ runner.temp }}/dtqc-artifacts
          TRACKED_DTQC: the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          from pathlib import Path

          generated = Path(os.environ["GENERATED_DTQC"])
          tracked = Path(os.environ["TRACKED_DTQC"])

          generated_metadata = json.loads((generated / "dtqc_artifact_metadata.json").read_text())
          generated_checksums = json.loads((generated / "dtqc_artifact_checksums.json").read_text())
          tracked_metadata = json.loads((tracked / "dtqc_artifact_metadata.json").read_text())
          tracked_checksums = json.loads((tracked / "dtqc_artifact_checksums.json").read_text())

          if generated_metadata != tracked_metadata:
              raise AssertionError(
                  "generated/tracked DTQC metadata differ:\n"
                  + json.dumps({"generated": generated_metadata, "tracked": tracked_metadata}, indent=2, sort_keys=True)
              )
          if generated_checksums != tracked_checksums:
              raise AssertionError(
                  "generated/tracked DTQC checksums differ:\n"
                  + json.dumps({"generated": generated_checksums, "tracked": tracked_checksums}, indent=2, sort_keys=True)
              )

          tracked_root = sorted(path.name for path in tracked.iterdir() if path.is_file())
          if tracked_root != generated_metadata["root_inventory"]:
              raise AssertionError(
                  f"root inventory mismatch: tracked={tracked_root}, expected={generated_metadata['root_inventory']}"
              )

          for name, expected in generated_checksums["root_files"].items():
              generated_digest = hashlib.sha256((generated / name).read_bytes()).hexdigest()
              tracked_digest = hashlib.sha256((tracked / name).read_bytes()).hexdigest()
              if generated_digest != expected or tracked_digest != expected:
                  raise AssertionError(
                      f"root byte mismatch for {name}: generated={generated_digest}, tracked={tracked_digest}, expected={expected}"
                  )

          generated_legacy = generated / "legacy_faithful"
          tracked_legacy = tracked / "legacy_faithful"
          tracked_legacy_names = sorted(path.name for path in tracked_legacy.iterdir() if path.is_file())
          if tracked_legacy_names != generated_metadata["legacy_faithful_inventory"]:
              raise AssertionError(
                  "legacy inventory mismatch: "
                  f"tracked={tracked_legacy_names}, expected={generated_metadata['legacy_faithful_inventory']}"
              )
          for name, expected in generated_checksums["legacy_faithful_files"].items():
              generated_digest = hashlib.sha256((generated_legacy / name).read_bytes()).hexdigest()
              tracked_digest = hashlib.sha256((tracked_legacy / name).read_bytes()).hexdigest()
              if generated_digest != expected or tracked_digest != expected:
                  raise AssertionError(
                      f"legacy byte mismatch for {name}: generated={generated_digest}, tracked={tracked_digest}, expected={expected}"
                  )
          PY
      - name: Validate committed full-tree inventory contracts
        run: >-
          python -m pytest -q
          tests/artifacts/test_dtqc_full_source_faithful_artifacts.py
