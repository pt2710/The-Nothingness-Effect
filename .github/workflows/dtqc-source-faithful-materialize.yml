name: DTQC source-faithful materialization

on:
  push:
    branches:
      - codex/tne-authoritative-source-recertification
    paths:
      - .github/workflows/dtqc-source-faithful-materialize.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dtqc-source-faithful-materialization
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/tne-authoritative-source-recertification
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore reviewed source payload
        shell: bash
        run: |
          set -euo pipefail
          cat .github/dtqc-source-faithful-payload/chunk_* \
            | base64 --decode \
            | tar -xz -C .
          python -m py_compile \
            the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/legacy_faithful_runtime.py \
            the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/run_legacy_faithful_suite.py

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt -r requirements-ai.txt

      - name: Run source-faithful runtime tests
        run: python -m pytest -q tests/numerical/test_dtqc_legacy_faithful_runtime.py

      - name: Regenerate complete tracked DTQC inventory
        run: >-
          python -m
          the_nothingness_effect.gravitational_cosmological_and_quantum_dynamics_architecture.discrete_time_quasicrystals_in_the_flowpoint.simulation.run_legacy_faithful_suite
          --output-dir
          the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts/legacy_faithful
          --seed 1
          --grid-size 240
          --time-steps 48
          --point-count 8000
          --sphere-resolution 64

      - name: Validate generated bytes and dynamics
        run: >-
          python -m pytest -q
          tests/numerical/test_dtqc_legacy_faithful_runtime.py
          tests/artifacts/test_dtqc_legacy_faithful_artifacts.py

      - name: Commit source-faithful runtime and regenerated artifacts
        shell: bash
        run: |
          set -euo pipefail
          branch="codex/tne-authoritative-source-recertification"
          artifact_dir="the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/artifacts/legacy_faithful"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .github/dtqc-source-faithful-payload
          git add \
            the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/legacy_faithful_runtime.py \
            the_nothingness_effect/gravitational_cosmological_and_quantum_dynamics_architecture/discrete_time_quasicrystals_in_the_flowpoint/simulation/run_legacy_faithful_suite.py \
            tests/numerical/test_dtqc_legacy_faithful_runtime.py \
            tests/artifacts/test_dtqc_legacy_faithful_artifacts.py \
            "$artifact_dir"
          git commit -m "Restore source-faithful DTQC visual dynamics and artifacts"
          git push origin "HEAD:$branch"
