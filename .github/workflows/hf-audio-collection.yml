name: TNE bounded Hugging Face audio collection

on:
  push:
    branches:
      - codex/tne-authoritative-source-recertification
    paths:
      - "tools/collect_hf_audio_datasets.py"
      - "docs/data/hf_audio_sources.json"
      - "tests/numerical/test_real_multimodal_data.py"
      - ".github/workflows/hf-audio-collection.yml"
  workflow_dispatch:
    inputs:
      max_per_source:
        description: Maximum clips per source
        required: false
        default: "10"
      max_total:
        description: Maximum clips across all sources
        required: false
        default: "30"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  collect-audio:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MAX_PER_SOURCE: ${{ inputs.max_per_source || '10' }}
      MAX_TOTAL: ${{ inputs.max_total || '30' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt "datasets[audio]>=4.0,<5.0"
      - run: python -m pip install -e .
      - name: Verify collector boundaries without network fixtures
        run: python -m pytest -q tests/numerical/test_real_multimodal_data.py
      - name: Stream bounded speech, music and sound-effect sources
        run: >-
          python tools/collect_hf_audio_datasets.py
          --catalog docs/data/hf_audio_sources.json
          --output reports/hf_audio_collection
          --max-per-source "$MAX_PER_SOURCE"
          --max-total "$MAX_TOTAL"
      - name: Package audio corpus and provenance
        run: >-
          python -m zipfile -c
          reports/hf_audio_collection.zip
          reports/hf_audio_collection
      - name: Upload license-partitioned audio evidence
        uses: actions/upload-artifact@v4
        with:
          name: tne-hf-audio-collection
          path: |
            reports/hf_audio_collection
            reports/hf_audio_collection.zip
          if-no-files-found: error
